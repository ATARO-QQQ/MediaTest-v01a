<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◆◇◆ ニュース管理室 v2.0 ◆◇◆</title>
    <style>
        /* 2000年代の個人ホームページ風デザイン */
        body {
            background-color: #000080;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            font-family: "MS P Gothic", "ＭＳ Ｐゴシック", sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00ffff;
            text-shadow: 2px 2px 0px #000000;
            border-bottom: 3px double #00ffff;
            display: inline-block;
        }
        marquee {
            background-color: #ff00ff;
            color: #ffffff;
            font-weight: bold;
            padding: 5px;
            margin-bottom: 20px;
            width: 80%;
            border: 2px outset #ffffff;
        }
        .container {
            width: 90%;
            max-width: 650px;
            margin: 0 auto;
            background-color: #c0c0c0;
            color: #000000;
            border: 4px outset #ffffff;
            padding: 15px;
            text-align: left;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background-color: #000080;
            color: #ffffff;
            padding: 8px;
            border: 2px inset #ffffff;
            width: 30%;
        }
        td {
            padding: 8px;
            border: 2px inset #ffffff;
            background-color: #ffffff;
        }
        input[type="text"], textarea, select {
            width: 95%;
            padding: 4px;
            border: 2px inset #c0c0c0;
            font-family: "MS P Gothic", sans-serif;
        }
        .btn-submit {
            background-color: #c0c0c0;
            border: 3px outset #ffffff;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        .btn-submit:active { border-style: inset; }
        .footer { margin-top: 30px; font-size: 12px; color: #00ffff; }
        .counter {
            background-color: #000; color: #0f0; font-family: monospace;
            padding: 2px 5px; border: 2px inset #888; letter-spacing: 3px;
        }
        /* カスタムメッセージボックス */
        #msg-box {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #c0c0c0; border: 3px outset #fff;
            padding: 20px; color: #000; z-index: 1000; text-align: center;
        }
        #msg-box button { border: 2px outset #fff; background: #c0c0c0; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <marquee scrollamount="5">☆★☆ カテゴリーとおすすめ機能を追加しました！(v2.0) ☆★☆</marquee>

    <h1>◆◇◆ ニュース投稿フォーム ◆◇◆</h1>

    <div class="container">
        <form id="news-form">
            <table>
                <tr>
                    <th>タイトル <span style="color:red;">*</span></th>
                    <td><input type="text" id="title" required placeholder="ニュースのタイトル"></td>
                </tr>
                <tr>
                    <th>カテゴリー</th>
                    <td>
                        <select id="category">
                            <option value="総合">総合</option>
                            <option value="IT・テック">IT・テック</option>
                            <option value="エンタメ">エンタメ</option>
                            <option value="スポーツ">スポーツ</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th>目立たせる！</th>
                    <td>
                        <label>
                            <input type="checkbox" id="is-recommended" style="width: auto;"> 
                            <b>✨「ピックアップ」欄に表示する</b>
                        </label>
                    </td>
                </tr>
                <tr>
                    <th>本文 <span style="color:red;">*</span></th>
                    <td><textarea id="content" rows="6" required placeholder="ニュースの本文を書いてください。"></textarea></td>
                </tr>
                <tr>
                    <th>画像URL</th>
                    <td><input type="text" id="image-url" placeholder="http://... (写真がある場合)"></td>
                </tr>
                <tr>
                    <th>YouTube ID</th>
                    <td><input type="text" id="youtube-id" placeholder="例: dQw4w9WgXcQ (動画がある場合)"></td>
                </tr>
            </table>
            <button type="submit" class="btn-submit">カキコする (送信)</button>
        </form>
    </div>

    <div id="msg-box">
        <p id="msg-text"></p>
        <button onclick="document.getElementById('msg-box').style.display='none'">OK</button>
    </div>

    <div class="footer">
        <p>あなたは <span class="counter">0010025</span> 人目の訪問者です。</p>
        <p>Copyright (C) 200X News Admin. All Rights Reserved.</p>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const defaultFirebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        let firebaseConfig = defaultFirebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-custom-news';
        const newsCollectionPath = typeof __app_id !== 'undefined' 
            ? `artifacts/${appId}/public/data/news` 
            : 'news';

        function showMessage(text) {
            document.getElementById('msg-text').innerText = text;
            document.getElementById('msg-box').style.display = 'block';
        }

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    const { signInWithCustomToken } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                showMessage("認証に失敗しました。");
            }
        }
        initAuth();

        document.getElementById('news-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return showMessage("認証待ちです。");

            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const isRecommended = document.getElementById('is-recommended').checked;
            const content = document.getElementById('content').value;
            const imageUrl = document.getElementById('image-url').value;
            const youtubeId = document.getElementById('youtube-id').value;
            const btn = document.querySelector('.btn-submit');

            btn.disabled = true; btn.innerText = "送信中...";

            try {
                await addDoc(collection(db, newsCollectionPath), {
                    title: title,
                    category: category,           // ★追加: カテゴリー
                    isRecommended: isRecommended, // ★追加: おすすめフラグ
                    content: content,
                    imageUrl: imageUrl || null,
                    youtubeId: youtubeId || null,
                    createdAt: Date.now()
                });
                showMessage("★カキコ完了しました！★");
                document.getElementById('news-form').reset();
            } catch (error) {
                showMessage("エラー: " + error.message);
            } finally {
                btn.disabled = false; btn.innerText = "カキコする (送信)";
            }
        });
    </script>
</body>
</html>
