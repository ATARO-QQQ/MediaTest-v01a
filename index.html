<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero News - 管理・投稿画面</title>
    <style>
        /* =========================================
           管理モード用スタイル (2000年代風)
           ========================================= */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: #000080;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            font-family: "MS P Gothic", "ＭＳ Ｐゴシック", sans-serif;
            text-align: center;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }
        
        h1.admin-title {
            color: #00ffff;
            text-shadow: 2px 2px 0px #000000;
            border-bottom: 3px double #00ffff;
            display: inline-block;
            font-size: clamp(18px, 5vw, 24px);
            margin-bottom: 20px;
        }
        
        marquee {
            background-color: #ff00ff; 
            color: #ffffff; 
            font-weight: bold;
            padding: 5px; 
            margin-bottom: 20px; 
            width: 100%; 
            max-width: 650px;
            border: 2px outset #ffffff;
        }
        
        .admin-container {
            width: 100%; 
            max-width: 650px; 
            margin: 0 auto;
            background-color: #c0c0c0; 
            color: #000000;
            border: 4px outset #ffffff; 
            padding: 15px; 
            text-align: left;
        }
        
        table { width: 100%; border-collapse: collapse; }
        
        th {
            background-color: #000080; 
            color: #ffffff; 
            padding: 10px;
            border: 2px inset #ffffff; 
            width: 30%;
            vertical-align: middle;
        }
        
        td {
            padding: 10px; 
            border: 2px inset #ffffff; 
            background-color: #ffffff;
        }
        
        input[type="text"], textarea, select, input[type="file"] {
            width: 100%; 
            padding: 6px; 
            border: 2px inset #c0c0c0;
            font-family: "MS P Gothic", sans-serif;
            font-size: 16px;
        }
        
        .btn-submit {
            background-color: #c0c0c0; 
            border: 3px outset #ffffff;
            padding: 10px 20px; 
            font-weight: bold; 
            cursor: pointer;
            margin-top: 15px; 
            width: 100%;
        }
        
        .btn-submit:active { border-style: inset; }
        .btn-submit:disabled { color: #888; cursor: not-allowed; }
        
        /* カスタムメッセージボックス */
        #msg-box {
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            background: #c0c0c0; 
            border: 3px outset #fff;
            padding: 20px; 
            color: #000; 
            z-index: 1000; 
            text-align: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            min-width: 250px;
        }
        
        #msg-box button { 
            border: 2px outset #fff; 
            background: #c0c0c0; 
            cursor: pointer; 
            margin-top: 15px; 
            padding: 5px 20px; 
            font-weight: bold;
        }
        
        .preview-container {
            margin-top: 10px;
            max-width: 100%;
            display: none;
        }
        .preview-container img {
            max-width: 100%;
            height: auto;
            border: 2px inset #c0c0c0;
        }

        /* レスポンシブ対応 (スマートフォン向け) */
        @media screen and (max-width: 600px) {
            table, tbody, tr, th, td {
                display: block;
                width: 100%;
            }
            th {
                border-bottom: none;
                margin-top: 10px;
            }
            td {
                border-top: none;
                padding-top: 5px;
            }
            tr:first-child th {
                margin-top: 0;
            }
            .admin-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <marquee scrollamount="5">管理画面 - ニュースを登録してください</marquee>

    <h1 class="admin-title">ニュース投稿フォーム</h1>

    <div class="admin-container">
        <form id="news-form">
            <table>
                <tr>
                    <th>タイトル <span style="color:red;">*</span></th>
                    <td><input type="text" id="title" required placeholder="ニュースのタイトル"></td>
                </tr>
                <tr>
                    <th>カテゴリー</th>
                    <td>
                        <select id="category">
                            <option value="総合">総合</option>
                            <option value="IT・テック">IT・テック</option>
                            <option value="エンタメ">エンタメ</option>
                            <option value="スポーツ">スポーツ</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th>目立たせる</th>
                    <td>
                        <label>
                            <input type="checkbox" id="is-recommended" style="width: auto;"> 
                            <b>「ピックアップ」欄に表示する</b>
                        </label>
                    </td>
                </tr>
                <tr>
                    <th>本文 <span style="color:red;">*</span></th>
                    <td><textarea id="content" rows="6" required placeholder="ニュースの本文を書いてください。"></textarea></td>
                </tr>
                <tr>
                    <th>画像アップロード</th>
                    <td>
                        <input type="file" id="image-upload" accept="image/*">
                        <div class="preview-container" id="image-preview-container">
                            <img id="image-preview" src="" alt="プレビュー">
                        </div>
                    </td>
                </tr>
                <tr>
                    <th>YouTube ID</th>
                    <td><input type="text" id="youtube-id" placeholder="例: dQw4w9WgXcQ (動画がある場合)"></td>
                </tr>
            </table>
            
            <button type="submit" class="btn-submit" id="submit-btn" disabled>データベース接続中...</button>
        </form>
    </div>

    <!-- 管理画面用メッセージボックス -->
    <div id="msg-box">
        <p id="msg-text" style="margin: 0; font-weight: bold;"></p>
        <button onclick="document.getElementById('msg-box').style.display='none'">OK</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebaseの設定と初期化
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDQDL4MoMnXFX9CQ_iA00Q7HJETID_ZDLk",
            authDomain: "mediatest-v01c-f9bea.firebaseapp.com",
            projectId: "mediatest-v01c-f9bea",
            storageBucket: "mediatest-v01c-f9bea.firebasestorage.app",
            messagingSenderId: "1074645734117",
            appId: "1:1074645734117:web:56ee5b96c3209ea9f23a0c"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const btn = document.getElementById('submit-btn');
        const imageUpload = document.getElementById('image-upload');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        let isReady = false;
        let currentUser = null;
        let compressedImageDataUrl = null;

        function showMessage(text) {
            document.getElementById('msg-text').innerText = text;
            document.getElementById('msg-box').style.display = 'block';
        }

        // 画像のプレビューと圧縮処理
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) {
                compressedImageDataUrl = null;
                imagePreviewContainer.style.display = 'none';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // サイズをリサイズして圧縮 (Firestoreの1MB制限対策)
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // JPEG形式で圧縮（品質0.7）
                    compressedImageDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    imagePreview.src = compressedImageDataUrl;
                    imagePreviewContainer.style.display = 'block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // 認証処理
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("認証エラー:", error);
                showMessage("Firebaseの認証に失敗しました。");
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                isReady = true;
                btn.disabled = false;
                btn.innerText = "送信する";
            } else {
                currentUser = null;
                isReady = false;
                btn.disabled = true;
                btn.innerText = "認証エラー";
            }
        });

        // フォーム送信処理
        document.getElementById('news-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!isReady || !currentUser) return showMessage("データベースの準備ができていません。");
            
            btn.disabled = true; 
            btn.innerText = "送信中...";

            try {
                // public コレクションのパスを構築
                const newsRef = collection(db, 'artifacts', appId, 'public', 'data', 'news');
                
                await addDoc(newsRef, {
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    isRecommended: document.getElementById('is-recommended').checked,
                    content: document.getElementById('content').value,
                    imageUrl: compressedImageDataUrl, // 圧縮した画像データ
                    youtubeId: document.getElementById('youtube-id').value || null,
                    createdAt: Date.now(),
                    authorId: currentUser.uid
                });

                showMessage("送信が完了しました。");
                document.getElementById('news-form').reset();
                compressedImageDataUrl = null;
                imagePreviewContainer.style.display = 'none';
            } catch (error) {
                showMessage("送信エラー: " + error.message);
                console.error("Firestore Add Error:", error);
            } finally {
                btn.disabled = false; 
                btn.innerText = "送信する";
            }
        });
    </script>
</body>
</html>
