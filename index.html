<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero News - 管理・投稿画面</title>
    <style>
        /* =========================================
           管理モード用スタイル (2000年代風)
           ========================================= */
        body {
            background-color: #000080;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 20px 20px;
            color: #ffffff;
            font-family: "MS P Gothic", "ＭＳ Ｐゴシック", sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px 0;
            min-height: 100vh;
        }
        
        h1.admin-title {
            color: #00ffff;
            text-shadow: 2px 2px 0px #000000;
            border-bottom: 3px double #00ffff;
            display: inline-block;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        marquee {
            background-color: #ff00ff; 
            color: #ffffff; 
            font-weight: bold;
            padding: 5px; 
            margin-bottom: 20px; 
            width: 80%; 
            border: 2px outset #ffffff;
        }
        
        .admin-container {
            width: 90%; 
            max-width: 650px; 
            margin: 0 auto;
            background-color: #c0c0c0; 
            color: #000000;
            border: 4px outset #ffffff; 
            padding: 15px; 
            text-align: left;
        }
        
        table { width: 100%; border-collapse: collapse; }
        
        th {
            background-color: #000080; 
            color: #ffffff; 
            padding: 8px;
            border: 2px inset #ffffff; 
            width: 30%;
        }
        
        td {
            padding: 8px; 
            border: 2px inset #ffffff; 
            background-color: #ffffff;
        }
        
        input[type="text"], textarea, select {
            width: 95%; 
            padding: 4px; 
            border: 2px inset #c0c0c0;
            font-family: "MS P Gothic", sans-serif;
        }
        
        .btn-submit {
            background-color: #c0c0c0; 
            border: 3px outset #ffffff;
            padding: 10px 20px; 
            font-weight: bold; 
            cursor: pointer;
            margin-top: 15px; 
            width: 100%;
        }
        
        .btn-submit:active { border-style: inset; }
        
        /* カスタムメッセージボックス */
        #msg-box {
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            background: #c0c0c0; 
            border: 3px outset #fff;
            padding: 20px; 
            color: #000; 
            z-index: 1000; 
            text-align: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
        
        #msg-box button { 
            border: 2px outset #fff; 
            background: #c0c0c0; 
            cursor: pointer; 
            margin-top: 10px; 
            padding: 5px 15px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <marquee scrollamount="5">☆★☆ 管理画面 - ニュースを登録してください ☆★☆</marquee>
    <h1 class="admin-title">◆◇◆ ニュース投稿フォーム ◆◇◆</h1>
    <div class="admin-container">
        <form id="news-form">
            <table>
                <tr>
                    <th>タイトル <span style="color:red;">*</span></th>
                    <td><input type="text" id="title" required placeholder="ニュースのタイトル"></td>
                </tr>
                <tr>
                    <th>カテゴリー</th>
                    <td>
                        <select id="category">
                            <option value="総合">総合</option>
                            <option value="IT・テック">IT・テック</option>
                            <option value="エンタメ">エンタメ</option>
                            <option value="スポーツ">スポーツ</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th>目立たせる！</th>
                    <td>
                        <label>
                            <input type="checkbox" id="is-recommended" style="width: auto;"> 
                            <b>「ピックアップ」欄に表示する</b>
                        </label>
                    </td>
                </tr>
                <tr>
                    <th>本文 <span style="color:red;">*</span></th>
                    <td><textarea id="content" rows="6" required placeholder="ニュースの本文を書いてください。"></textarea></td>
                </tr>
                <tr>
                    <th>画像URL</th>
                    <td><input type="text" id="image-url" placeholder="http://... (写真がある場合)"></td>
                </tr>
                <tr>
                    <th>YouTube ID</th>
                    <td><input type="text" id="youtube-id" placeholder="例: dQw4w9WgXcQ (動画がある場合)"></td>
                </tr>
            </table>
            <button type="submit" class="btn-submit" id="submit-btn" disabled>データベース接続中...</button>
        </form>
    </div>

    <!-- 管理画面用メッセージボックス -->
    <div id="msg-box">
        <p id="msg-text" style="margin: 0; font-weight: bold;"></p>
        <button onclick="document.getElementById('msg-box').style.display='none'">OK</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyDQDL4MoMnXFX9CQ_iA00Q7HJETID_ZDLk",
  authDomain: "mediatest-v01c-f9bea.firebaseapp.com",
  projectId: "mediatest-v01c-f9bea",
  storageBucket: "mediatest-v01c-f9bea.firebasestorage.app",
  messagingSenderId: "1074645734117",
  appId: "1:1074645734117:web:56ee5b96c3209ea9f23a0c",
  measurementId: "G-FKT8FYDQ1D"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // 保存先のコレクション名（わかりやすく 'news' としています）
        const newsCollectionPath = "news";

        const btn = document.getElementById('submit-btn');
        let isReady = false;

        function showMessage(text) {
            document.getElementById('msg-text').innerText = text;
            document.getElementById('msg-box').style.display = 'block';
        }

        // 認証状態の監視
        onAuthStateChanged(auth, (user) => {
            if (user) {
                isReady = true;
                btn.disabled = false;
                btn.innerText = "カキコする (送信)";
            } else {
                isReady = false;
                btn.disabled = true;
                btn.innerText = "認証エラー";
            }
        });

        // 匿名認証でログイン（※Firestoreルールで要許可）
        signInAnonymously(auth).catch((error) => {
            console.error("認証エラー:", error);
            showMessage("Firebaseの認証に失敗しました。設定を確認してください。");
        });

        document.getElementById('news-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!isReady) return showMessage("データベースの準備ができていません。");

            btn.disabled = true; 
            btn.innerText = "送信中...";

            try {
                await addDoc(collection(db, newsCollectionPath), {
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    isRecommended: document.getElementById('is-recommended').checked,
                    content: document.getElementById('content').value,
                    imageUrl: document.getElementById('image-url').value || null,
                    youtubeId: document.getElementById('youtube-id').value || null,
                    createdAt: Date.now()
                });
                showMessage("★カキコ完了しました！★");
                document.getElementById('news-form').reset();
            } catch (error) {
                // ここでエラーが出る場合はFirestoreのセキュリティルールが原因の可能性が高いです
                showMessage("送信エラー: 権限がないか設定が間違っています。(" + error.message + ")");
                console.error("Firestore Add Error:", error);
            } finally {
                btn.disabled = false; 
                btn.innerText = "カキコする (送信)";
            }
        });
    </script>
</body>
</html>
