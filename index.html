<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>★☆ニュース投稿・管理室☆★</title>
  <style>
    
    body {
      background-color: #000080; 
      background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAYAAABytg0kAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAABZJREFUeNpi2rVrf2YwEAAQJiCQAAgwADa4Awb8E8pPAAAAAElFTkSuQmCC'); /* 星空風のドットパターン */
      color: #00FFFF; 
      font-family: "ＭＳ Ｐゴシック", "MS PGothic", sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #FF00FF;
      border-bottom: 3px double #00FFFF;
      padding-bottom: 5px;
      display: inline-block;
      text-shadow: 2px 2px #000;
    }
    .container {
      width: 90%;
      max-width: 800px;
      margin: 0 auto;
      background-color: #000000;
      border: 5px ridge #00FFFF;
      padding: 20px;
      box-sizing: border-box;
    }
    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }
    label {
      font-weight: bold;
      color: #FFFF00;
      display: block;
      margin-bottom: 5px;
    }
    input[type="text"], input[type="url"], textarea {
      width: 100%;
      padding: 5px;
      background-color: #333333;
      color: #FFFFFF;
      border: 1px solid #00FFFF;
      box-sizing: border-box;
      font-family: "ＭＳ Ｐゴシック", sans-serif;
    }
    textarea {
      height: 150px;
      resize: vertical;
    }
    .btn {
      background-color: #FFFF00;
      color: #000000;
      font-weight: bold;
      border: 3px outset #FFFF00;
      padding: 10px 30px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    .btn:active {
      border: 3px inset #FFFF00;
    }
    hr {
      border: 0;
      border-top: 1px dashed #00FFFF;
      margin: 20px 0;
    }
    .marquee-container {
      background-color: #FF0000;
      color: #FFFFFF;
      font-weight: bold;
      padding: 5px;
      margin-bottom: 20px;
      overflow: hidden;
      white-space: nowrap;
      border: 2px solid #FFFFFF;
    }
    .marquee-text {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 15s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-100%, 0); }
    }
    #statusMessage {
      margin-top: 15px;
      font-weight: bold;
      color: #00FF00;
    }
    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #888888;
    }
  </style>
</head>
<body>

  <div class="marquee-container">
    <div class="marquee-text">♪♪♪ ようこそ管理画面へ！関係者以外立ち入り禁止です！ ♪♪♪</div>
  </div>

  <h1>★☆ ニュース投稿フォーム ☆★</h1>

  <div class="container">
    <p>以下のフォームに入力して「送信する」ボタンを押してね（＾▽＾）/ <br>※HTMLタグは使えません。</p>
    <hr>
    
    <form id="newsForm">
      <div class="form-group">
        <label for="title">■タイトル (必須)</label>
        <input type="text" id="title" required placeholder="ニュースのタイトルを入力">
      </div>
      
      <div class="form-group">
        <label for="content">■本文 (必須)</label>
        <textarea id="content" required placeholder="ニュースの内容を入力してください。改行も反映されます。"></textarea>
      </div>
      
      <div class="form-group">
        <label for="imageUrl">■写真のURL (任意)</label>
        <input type="url" id="imageUrl" placeholder="例: https://example.com/image.jpg">
      </div>

      <div class="form-group">
        <label for="videoUrl">■動画のURL (任意・YouTube等の埋め込み用)</label>
        <input type="url" id="videoUrl" placeholder="例: https://www.youtube.com/embed/XXXXX">
      </div>
      
      <button type="submit" class="btn">送信する</button>
    </form>

    <div id="statusMessage"></div>
  </div>

  <div class="footer">
    Since 2026.03.19<br>
    (C) Admin Room All Rights Reserved.
  </div>

  <script>
    // Cloudflare Workers APIEnd Point
    const API_ENDPOINT = 'https://your-api-worker.your-subdomain.workers.dev/api/news';
    // セキュリティ用トークン
    const ADMIN_TOKEN = 'YOUR_SECRET_ADMIN_TOKEN';

    document.getElementById('newsForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const imageUrl = document.getElementById('imageUrl').value;
      const videoUrl = document.getElementById('videoUrl').value;
      
      const statusDiv = document.getElementById('statusMessage');
      statusDiv.style.color = '#FFFF00';
      statusDiv.textContent = '通信中...';

      const postData = {
        title: title,
        content: content,
        imageUrl: imageUrl,
        videoUrl: videoUrl,
        createdAt: new Date().toISOString()
      };

      try {
        /* ==== 実際の実装ではこのブロックのコメントアウトを外します ====
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${ADMIN_TOKEN}` // API保護用
          },
          body: JSON.stringify(postData)
        });

        if (!response.ok) {
          throw new Error('サーバーエラーが発生しました');
        }
        ========================================================= */

        // デモ用の疑似待機処理
        await new Promise(resolve => setTimeout(resolve, 1000));

        statusDiv.style.color = '#00FF00';
        statusDiv.textContent = '★☆ ニュースの投稿が完了しました！ ☆★';
        document.getElementById('newsForm').reset();
        
        setTimeout(() => {
          statusDiv.textContent = '';
        }, 3000);

      } catch (error) {
        console.error('Error:', error);
        statusDiv.style.color = '#FF0000';
        statusDiv.textContent = 'エラーが発生しました: ' + error.message;
      }
    });
  </script>
</body>
</html>
